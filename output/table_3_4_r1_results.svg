<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920">
  <defs>
    <style>
      .title { font: 700 34px 'DejaVu Sans', sans-serif; fill: #1f2933; }
      .header { font: 700 20px 'DejaVu Sans', sans-serif; fill: #ffffff; }
      .cell { font: 500 20px 'DejaVu Sans', sans-serif; fill: #243b53; }
      .note { font: 500 17px 'DejaVu Sans', sans-serif; fill: #52606d; }
      .headbox { fill: #355070; stroke: #355070; stroke-width: 2; }
      .row1 { fill: #f8fbff; stroke: #94a3b8; stroke-width: 2; }
      .row2 { fill: #f6fbf4; stroke: #94a3b8; stroke-width: 2; }
      .row3 { fill: #fff8ef; stroke: #94a3b8; stroke-width: 2; }
      .outer { fill: none; stroke: #5c677d; stroke-width: 3; }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="920" fill="#fcfcf9"/>
  <text x="750" y="65" text-anchor="middle" class="title">Table 3.4 - Results of the R1 Regime</text>

  <rect x="120" y="120" width="1260" height="460" class="outer"/>

  <rect x="120" y="120" width="180" height="90" class="headbox"/>
  <rect x="300" y="120" width="180" height="90" class="headbox"/>
  <rect x="480" y="120" width="260" height="90" class="headbox"/>
  <rect x="740" y="120" width="220" height="90" class="headbox"/>
  <rect x="960" y="120" width="420" height="90" class="headbox"/>

  <text x="210" y="175" text-anchor="middle" class="header">Map</text>
  <text x="390" y="175" text-anchor="middle" class="header">N</text>
  <text x="610" y="175" text-anchor="middle" class="header">Makespan</text>
  <text x="850" y="175" text-anchor="middle" class="header">SOC</text>
  <text x="1170" y="175" text-anchor="middle" class="header">Planning time, s</text>

  <rect x="120" y="210" width="180" height="90" class="row1"/>
  <rect x="300" y="210" width="180" height="90" class="row1"/>
  <rect x="480" y="210" width="260" height="90" class="row1"/>
  <rect x="740" y="210" width="220" height="90" class="row1"/>
  <rect x="960" y="210" width="420" height="90" class="row1"/>
  <text x="210" y="265" text-anchor="middle" class="cell">A</text>
  <text x="390" y="265" text-anchor="middle" class="cell">1</text>
  <text x="610" y="265" text-anchor="middle" class="cell">2</text>
  <text x="850" y="265" text-anchor="middle" class="cell">3</text>
  <text x="1170" y="265" text-anchor="middle" class="cell">0.095823</text>

  <rect x="120" y="300" width="180" height="90" class="row2"/>
  <rect x="300" y="300" width="180" height="90" class="row2"/>
  <rect x="480" y="300" width="260" height="90" class="row2"/>
  <rect x="740" y="300" width="220" height="90" class="row2"/>
  <rect x="960" y="300" width="420" height="90" class="row2"/>
  <text x="210" y="355" text-anchor="middle" class="cell">A</text>
  <text x="390" y="355" text-anchor="middle" class="cell">2</text>
  <text x="610" y="355" text-anchor="middle" class="cell">2</text>
  <text x="850" y="355" text-anchor="middle" class="cell">5</text>
  <text x="1170" y="355" text-anchor="middle" class="cell">0.108520</text>

  <rect x="120" y="390" width="180" height="90" class="row3"/>
  <rect x="300" y="390" width="180" height="90" class="row3"/>
  <rect x="480" y="390" width="260" height="90" class="row3"/>
  <rect x="740" y="390" width="220" height="90" class="row3"/>
  <rect x="960" y="390" width="420" height="90" class="row3"/>
  <text x="210" y="445" text-anchor="middle" class="cell">A</text>
  <text x="390" y="445" text-anchor="middle" class="cell">8</text>
  <text x="610" y="445" text-anchor="middle" class="cell">4</text>
  <text x="850" y="445" text-anchor="middle" class="cell">40</text>
  <text x="1170" y="445" text-anchor="middle" class="cell">15.709505</text>

  <rect x="120" y="480" width="180" height="90" class="row1"/>
  <rect x="300" y="480" width="180" height="90" class="row1"/>
  <rect x="480" y="480" width="260" height="90" class="row1"/>
  <rect x="740" y="480" width="220" height="90" class="row1"/>
  <rect x="960" y="480" width="420" height="90" class="row1"/>
  <text x="210" y="535" text-anchor="middle" class="cell">B</text>
  <text x="390" y="535" text-anchor="middle" class="cell">8</text>
  <text x="610" y="535" text-anchor="middle" class="cell">1</text>
  <text x="850" y="535" text-anchor="middle" class="cell">16</text>
  <text x="1170" y="535" text-anchor="middle" class="cell">0.055002</text>

  <text x="750" y="665" text-anchor="middle" class="note">
    The table contains representative R1 runs obtained for the discrete centralized CBS regime.
  </text>
  <text x="750" y="700" text-anchor="middle" class="note">
    Map A uses the base landmark graph; Map B uses the denser obstacle-constrained graph.
  </text>
  <text x="750" y="735" text-anchor="middle" class="note">
    For N = 8 on Map A, the planning time increases sharply, illustrating the growth of centralized planning complexity.
  </text>
  <text x="750" y="790" text-anchor="middle" class="note">
    Suggested note for the text: the numerical values correspond to the implemented discrete reference experiments and are used for methodological comparison.
  </text>
</svg>
