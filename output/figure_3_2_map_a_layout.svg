<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <defs>
    <style>
      .title { font: 700 34px 'DejaVu Sans', sans-serif; fill: #1f2933; }
      .subtitle { font: 600 24px 'DejaVu Sans', sans-serif; fill: #355070; }
      .label { font: 600 21px 'DejaVu Sans', sans-serif; fill: #243b53; }
      .body { font: 500 18px 'DejaVu Sans', sans-serif; fill: #486581; }
      .panel-left { fill: #f2f7ff; stroke: #457b9d; stroke-width: 3; rx: 22; ry: 22; }
      .panel-right { fill: #f3fbf1; stroke: #588157; stroke-width: 3; rx: 22; ry: 22; }
      .inner { fill: #ffffff; stroke: #94a3b8; stroke-width: 2.5; stroke-dasharray: 10 8; rx: 18; ry: 18; }
      .node { fill: #ffffff; stroke: #1d3557; stroke-width: 2.8; }
      .edge { stroke: #90a4ae; stroke-width: 4; }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="900" fill="#fcfcf9"/>

  <text x="750" y="70" text-anchor="middle" class="title">Figure 3.2 - Map A (Open Environment)</text>

  <rect x="70" y="120" width="620" height="690" class="panel-left"/>
  <text x="380" y="165" text-anchor="middle" class="subtitle">Discrete map representation</text>
  <rect x="110" y="200" width="540" height="560" class="inner"/>

  <line x1="210" y1="300" x2="380" y2="300" class="edge"/>
  <line x1="380" y1="300" x2="550" y2="300" class="edge"/>
  <line x1="210" y1="480" x2="380" y2="480" class="edge"/>
  <line x1="380" y1="480" x2="550" y2="480" class="edge"/>
  <line x1="210" y1="660" x2="380" y2="660" class="edge"/>
  <line x1="380" y1="660" x2="550" y2="660" class="edge"/>
  <line x1="210" y1="300" x2="210" y2="480" class="edge"/>
  <line x1="210" y1="480" x2="210" y2="660" class="edge"/>
  <line x1="380" y1="300" x2="380" y2="480" class="edge"/>
  <line x1="380" y1="480" x2="380" y2="660" class="edge"/>
  <line x1="550" y1="300" x2="550" y2="480" class="edge"/>
  <line x1="550" y1="480" x2="550" y2="660" class="edge"/>

  <circle cx="210" cy="300" r="28" class="node"/>
  <circle cx="380" cy="300" r="28" class="node"/>
  <circle cx="550" cy="300" r="28" class="node"/>
  <circle cx="210" cy="480" r="28" class="node"/>
  <circle cx="380" cy="480" r="28" class="node"/>
  <circle cx="550" cy="480" r="28" class="node"/>
  <circle cx="210" cy="660" r="28" class="node"/>
  <circle cx="380" cy="660" r="28" class="node"/>
  <circle cx="550" cy="660" r="28" class="node"/>

  <text x="210" y="307" text-anchor="middle" class="body">LM1</text>
  <text x="380" y="307" text-anchor="middle" class="body">LM2</text>
  <text x="550" y="307" text-anchor="middle" class="body">LM3</text>
  <text x="210" y="487" text-anchor="middle" class="body">LM4</text>
  <text x="380" y="487" text-anchor="middle" class="body">LM5</text>
  <text x="550" y="487" text-anchor="middle" class="body">LM6</text>
  <text x="210" y="667" text-anchor="middle" class="body">LM7</text>
  <text x="380" y="667" text-anchor="middle" class="body">LM8</text>
  <text x="550" y="667" text-anchor="middle" class="body">LM9</text>

  <text x="380" y="735" text-anchor="middle" class="body">Suggested content: landmark graph, robot start positions, graph connectivity</text>

  <rect x="810" y="120" width="620" height="690" class="panel-right"/>
  <text x="1120" y="165" text-anchor="middle" class="subtitle">Gazebo view of the same environment</text>
  <rect x="850" y="200" width="540" height="560" class="inner"/>

  <text x="1120" y="440" text-anchor="middle" class="label">Insert Gazebo screenshot here</text>
  <text x="1120" y="480" text-anchor="middle" class="body">Top view or perspective view with visible free passages</text>
  <text x="1120" y="512" text-anchor="middle" class="body">The screenshot should correspond to the same map used in the discrete model</text>
  <text x="1120" y="735" text-anchor="middle" class="body">Suggested content: open environment, visible passages, same landmarks or robot spawns</text>

  <text x="750" y="855" text-anchor="middle" class="body">
    Caption suggestion: Map A in two representations: discrete landmark graph on the left and the corresponding Gazebo scene on the right.
  </text>
</svg>
